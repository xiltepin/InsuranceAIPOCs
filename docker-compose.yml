services:
  # Database logic
  # WARNING: A new volume means an empty DB. Change .env DB_HOST to this postgres 
  # container name if you want to use it instead of the host LXC postgres.
  postgres:
    image: postgres:16
    container_name: insurance_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" # Exposed on 5433 to not conflict with host 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rating-engine:
    build:
      context: ./rating-engine
    container_name: insurance_rating_engine
    restart: always
    ports:
      - "${RATING_ENGINE_PORT}:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync+restart
          path: ./rating-engine
          target: /app
        - action: rebuild
          path: ./rating-engine/requirements.txt

  backend:
    build:
      context: ./backend
    container_name: insurance_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - RATING_ENGINE_URL=${RATING_ENGINE_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}?schema=public
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: rebuild
          path: ./backend

  frontend:
    build:
      context: ./frontend
    container_name: insurance_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - CUSTOMERS_API_URL=${CUSTOMERS_API_URL}
    develop:
      watch:
        - action: rebuild
          path: ./frontend

volumes:
  pgdata:
